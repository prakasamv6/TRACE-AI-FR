# ai_tool_inventory.yaml
# Extensible AI Tool Inventory for Forensic Detection
# Add new tools or update detection rules as needed

tools:
  - tool_id: chatgpt_desktop
    tool_name: ChatGPT Desktop
    vendor: OpenAI
    category: Native Assistant
    platform_supported: [Windows, macOS]
    execution_surface: [DESKTOP_APP]
    artifact_path_candidates:
      Windows:
        - "%LocalAppData%/Programs/ChatGPT"
        - "%AppData%/Roaming/ChatGPT"
      macOS:
        - "~/Library/Application Support/ChatGPT"
    detection_method: "Install folder, config, binary signature"
    notes: "Presence does not equal use."
    rule_version: "1.0.0"
  - tool_id: ollama
    tool_name: Ollama
    vendor: Ollama
    category: Local LLM
    platform_supported: [Windows, macOS, Linux]
    execution_surface: [TERMINAL, DESKTOP_APP]
    artifact_path_candidates:
      Windows:
        - "%UserProfile%/.ollama"
        - "%ProgramFiles%/Ollama"
      macOS:
        - "~/Library/Application Support/Ollama"
        - "/usr/local/bin/ollama"
      Linux:
        - "~/.ollama"
        - "/usr/local/bin/ollama"
    detection_method: "Config folder, binary, model files"
    notes: "Portable install possible."
    rule_version: "1.0.0"
